name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce. Minimal example preferred.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
  - type: input
    id: version
    attributes:
      label: Munin version / commit
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Self-host (docker compose)
        - Hosted (getmunin.com)
        - Local dev
