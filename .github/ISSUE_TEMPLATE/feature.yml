name: Feature request
description: Suggest something new or different
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Munin makes hard?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
