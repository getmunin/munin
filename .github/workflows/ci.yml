name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: munin
          POSTGRES_PASSWORD: munin
          POSTGRES_DB: munin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U munin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://munin:munin@localhost:5432/munin
      MUNIN_MIGRATE_URL: postgres://munin:munin@localhost:5432/munin
      DATABASE_URL: postgres://munin_app:munin_app@localhost:5432/munin

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migrate (creates munin_app role + RLS policies + module SQL)
        run: pnpm -F @getmunin/db db:migrate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
