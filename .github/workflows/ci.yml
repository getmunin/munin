name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: lint · typecheck · test · build · release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: munin
          POSTGRES_PASSWORD: munin
          POSTGRES_DB: munin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U munin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://munin:munin@localhost:5432/munin
      MUNIN_MIGRATE_URL: postgres://munin:munin@localhost:5432/munin
      DATABASE_URL: postgres://munin_app:munin_app@localhost:5432/munin
      MUNIN_AUTH_SECRET: ci-test-secret-not-for-production
      MUNIN_KEY_PEPPER: ci-test-pepper-not-for-production
      MUNIN_EMBEDDING_PROVIDER: stub
      MUNIN_MAIL_PROVIDER: stub
      MUNIN_WEBHOOK_WORKER_DISABLED: '1'
      MUNIN_CMS_SCHEDULE_WORKER_DISABLED: '1'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@getmunin'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migrate (creates munin_app role + RLS policies + module SQL)
        run: pnpm -F @getmunin/db db:migrate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: |
          set -e
          pkgs=$(node -e "
            const fs = require('fs');
            const path = require('path');
            const out = [];
            for (const dir of ['packages', 'apps']) {
              if (!fs.existsSync(dir)) continue;
              for (const sub of fs.readdirSync(dir)) {
                const pj = path.join(dir, sub, 'package.json');
                if (!fs.existsSync(pj)) continue;
                const m = JSON.parse(fs.readFileSync(pj, 'utf8'));
                if (m.scripts && m.scripts.test) out.push(m.name);
              }
            }
            console.log(out.join(' '));
          ")
          echo "# Test results" >> "$GITHUB_STEP_SUMMARY"
          for pkg in $pkgs; do
            echo "::group::Test $pkg"
            sum=$(mktemp)
            rc=0
            GITHUB_STEP_SUMMARY="$sum" pnpm --filter "$pkg" test || rc=$?
            # Vitest's reporter emits a generic "## Vitest Test Report"; relabel per package.
            if [ -s "$sum" ]; then
              sed "s|^## Vitest Test Report|## $pkg|" "$sum" >> "$GITHUB_STEP_SUMMARY"
              printf '\n' >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "::endgroup::"
            [ "$rc" -eq 0 ] || exit "$rc"
          done

      - name: Build
        run: pnpm build

      - name: Release (Changesets)
        id: changesets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore: release'
          title: 'chore: release packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Aggregated GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: node scripts/aggregate-release.mjs

      - name: Publish to MCP Registry
        if: steps.changesets.outputs.published == 'true'
        env:
          MCP_PRIVATE_KEY: ${{ secrets.MCP_PRIVATE_KEY }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          VERSION=$(node -e "process.stdout.write(JSON.parse(process.env.PUBLISHED_PACKAGES)[0].version)")
          echo "Publishing com.getmunin/munin@$VERSION to the MCP registry"
          jq --arg v "$VERSION" '.version = $v' server.json > server.json.tmp && mv server.json.tmp server.json
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login dns --domain getmunin.com --private-key "$MCP_PRIVATE_KEY"
          ./mcp-publisher publish

  licenses:
    name: license policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@getmunin'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check licenses
        run: pnpm licenses:check

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@getmunin'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build internal packages the web app depends on
        run: pnpm --filter '@getmunin/dashboard-pages' --filter '@getmunin/sdk' --filter '@getmunin/types' --filter '@getmunin/ui' build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json', 'pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @getmunin/web exec playwright install --with-deps chromium

      - name: Install browser deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @getmunin/web exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter @getmunin/web e2e

      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7
