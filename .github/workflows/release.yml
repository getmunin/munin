name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@getmunin'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm -r --filter '@getmunin/core' --filter '@getmunin/db' --filter '@getmunin/types' --filter '@getmunin/sdk' --filter '@getmunin/mcp-toolkit' --filter '@getmunin/bootstrap' --filter '@getmunin/backend-core' build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore: release'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge the release PR. The PR contains exactly one mechanical
      # `chore: release` commit (version bumps + CHANGELOGs derived from the
      # changesets that were already reviewed at feature merge time), so the
      # second-review step adds no value. --rebase lands that single commit
      # verbatim on main with no extra merge commit.
      #
      # We skip --auto because GitHub's auto-merge feature is paywalled for
      # private repos on the free plan. This merges immediately, before the
      # Release CI run on the PR's commit completes — but that CI run is
      # functionally identical to the Release run that fires once main moves
      # to the new commit, so we lose no signal.
      - name: Merge release PR
        if: steps.changesets.outputs.pullRequestNumber != ''
        run: gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} --rebase
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
