<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Munin chat widget — dev harness</title>
  </head>
  <body>
    <h1>Munin chat widget</h1>
    <p>Local dev harness. Edit attributes below to test the parser.</p>
    <script
      type="module"
      src="/src/widget.ts"
      data-munin-host="http://localhost:3001"
      data-widget-key="mn_widget_dev_local"
      data-channel-id="cnv_dev_local"
      data-munin-theme-color="#0066FF"
      data-munin-position="bottom-right"
      data-munin-greeting="Hi there. How can we help?"
      data-munin-org-name="Acme Support"
      data-munin-eyebrow="Acme Support · powered by Munin"
      data-munin-size="standard"
    ></script>
  </body>
</html>
