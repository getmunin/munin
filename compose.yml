# Self-host Munin in one command:
#
#   git clone https://github.com/getmunin/munin.git
#   cd munin
#   cp .env.example .env
#   docker compose up
#
# Brings up: Postgres + pgvector, Munin backend, Munin web.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-munin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-munin}
      POSTGRES_DB: ${POSTGRES_DB:-munin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - munin-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-munin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      MUNIN_MIGRATE_URL: postgres://${POSTGRES_USER:-munin}:${POSTGRES_PASSWORD:-munin}@postgres:5432/${POSTGRES_DB:-munin}
      DATABASE_URL: postgres://munin_app:munin_app@postgres:5432/${POSTGRES_DB:-munin}
    command: ["sh", "-c", "node dist/migrate.js && node dist/main.js"]
    ports:
      - "${BACKEND_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  munin-pg:
