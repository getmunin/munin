# Self-host Munin in one command:
#
#   git clone https://github.com/munin-dev/munin.git
#   cd munin
#   cp .env.example .env
#   docker compose up
#
# Brings up: Postgres + pgvector, Munin backend, Munin web.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-munin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-munin}
      POSTGRES_DB: ${POSTGRES_DB:-munin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - munin-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-munin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-munin}:${POSTGRES_PASSWORD:-munin}@postgres:5432/${POSTGRES_DB:-munin}
      MUNIN_PUBLIC_URL: ${MUNIN_PUBLIC_URL:-http://localhost:3001}
      MUNIN_AUTH_SECRET: ${MUNIN_AUTH_SECRET:?set MUNIN_AUTH_SECRET in .env}
    ports:
      - "${BACKEND_PORT:-3001}:3001"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"

  # Optional self-service AI sidecar.
  # Subscribes to conversation events on the local munin instance and posts
  # AI-driven agent replies. Off by default — start with:
  #   docker compose --profile ai up
  # See apps/self-service-ai/.env.example for required variables.
  self-service-ai:
    profiles: ["ai"]
    build:
      context: ..
      dockerfile: apps/self-service-ai/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      MUNIN_BASE_URL: ${MUNIN_BASE_URL:-http://backend:3001}
      MUNIN_ADMIN_API_KEY: ${MUNIN_ADMIN_API_KEY:?set MUNIN_ADMIN_API_KEY in .env}
      SELF_SERVICE_AI_PROVIDER_BASE_URL: ${SELF_SERVICE_AI_PROVIDER_BASE_URL:-https://openrouter.ai/api/v1}
      SELF_SERVICE_AI_PROVIDER_API_KEY: ${SELF_SERVICE_AI_PROVIDER_API_KEY:?set SELF_SERVICE_AI_PROVIDER_API_KEY in .env}
      SELF_SERVICE_AI_MODEL: ${SELF_SERVICE_AI_MODEL:-anthropic/claude-haiku-4.5}
      SELF_SERVICE_AI_SYSTEM_PROMPT: ${SELF_SERVICE_AI_SYSTEM_PROMPT:-You are a helpful self-service assistant. Use the available tools to look up accurate information from the knowledge base and the caller's CRM record before answering. If you cannot answer confidently, request a human handover.}
      SELF_SERVICE_AI_DEBOUNCE_MS: ${SELF_SERVICE_AI_DEBOUNCE_MS:-500}
      SELF_SERVICE_AI_MAX_TOOL_ITERATIONS: ${SELF_SERVICE_AI_MAX_TOOL_ITERATIONS:-8}
      SELF_SERVICE_AI_MAX_HISTORY_CHARS: ${SELF_SERVICE_AI_MAX_HISTORY_CHARS:-32000}
      SELF_SERVICE_AI_PROMPT_EMAIL: ${SELF_SERVICE_AI_PROMPT_EMAIL:-}
      SELF_SERVICE_AI_PROMPT_CHAT: ${SELF_SERVICE_AI_PROMPT_CHAT:-}
      SELF_SERVICE_AI_PROMPT_SMS: ${SELF_SERVICE_AI_PROMPT_SMS:-}
      SELF_SERVICE_AI_PROMPT_VOICE: ${SELF_SERVICE_AI_PROMPT_VOICE:-}
      SELF_SERVICE_AI_PROMPT_DEFAULT: ${SELF_SERVICE_AI_PROMPT_DEFAULT:-}

volumes:
  munin-pg:
