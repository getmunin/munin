# Self-host Munin in one command:
#
#   git clone https://github.com/munin-dev/munin.git
#   cd munin
#   cp .env.example .env
#   docker compose up
#
# Brings up: Postgres + pgvector, Munin backend, Munin web.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-munin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-munin}
      POSTGRES_DB: ${POSTGRES_DB:-munin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - munin-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-munin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-munin}:${POSTGRES_PASSWORD:-munin}@postgres:5432/${POSTGRES_DB:-munin}
      MUNIN_PUBLIC_URL: ${MUNIN_PUBLIC_URL:-http://localhost:3001}
      MUNIN_AUTH_SECRET: ${MUNIN_AUTH_SECRET:?set MUNIN_AUTH_SECRET in .env}
      MUNIN_CURATOR_KB_SWEEP_CRON: ${MUNIN_CURATOR_KB_SWEEP_CRON:-}
      MUNIN_CURATOR_CRM_HYGIENE_CRON: ${MUNIN_CURATOR_CRM_HYGIENE_CRON:-}
      MUNIN_CURATOR_CMS_STALE_CRON: ${MUNIN_CURATOR_CMS_STALE_CRON:-}
      MUNIN_CURATOR_SCHEDULER_DISABLED: ${MUNIN_CURATOR_SCHEDULER_DISABLED:-0}
    ports:
      - "${BACKEND_PORT:-3001}:3001"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"

  # Optional agent sidecar.
  # Subscribes to conversation events on the local munin instance, posts AI-driven
  # agent replies, runs KB curation per resolved handover, and runs scheduled
  # CRM hygiene + CMS stale-content review passes. Off by default — start with:
  #   docker compose --profile ai up
  # See apps/agent-sidecar/.env.example for required variables.
  agent-sidecar:
    profiles: ["ai"]
    build:
      context: ..
      dockerfile: apps/agent-sidecar/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      MUNIN_BASE_URL: ${MUNIN_BASE_URL:-http://backend:3001}
      MUNIN_ADMIN_API_KEY: ${MUNIN_ADMIN_API_KEY:?set MUNIN_ADMIN_API_KEY in .env}
      MUNIN_SIDECAR_PROVIDER_BASE_URL: ${MUNIN_SIDECAR_PROVIDER_BASE_URL:-https://openrouter.ai/api/v1}
      MUNIN_SIDECAR_PROVIDER_API_KEY: ${MUNIN_SIDECAR_PROVIDER_API_KEY:?set MUNIN_SIDECAR_PROVIDER_API_KEY in .env}
      MUNIN_SIDECAR_MODEL: ${MUNIN_SIDECAR_MODEL:-anthropic/claude-haiku-4.5}
      MUNIN_SIDECAR_DEBOUNCE_MS: ${MUNIN_SIDECAR_DEBOUNCE_MS:-500}
      MUNIN_SIDECAR_MAX_TOOL_ITERATIONS: ${MUNIN_SIDECAR_MAX_TOOL_ITERATIONS:-8}
      MUNIN_SIDECAR_MAX_HISTORY_CHARS: ${MUNIN_SIDECAR_MAX_HISTORY_CHARS:-32000}
      MUNIN_SIDECAR_CURATORS_DISABLED: ${MUNIN_SIDECAR_CURATORS_DISABLED:-0}
      MUNIN_SIDECAR_KB_CURATION_ON_HANDOVER: ${MUNIN_SIDECAR_KB_CURATION_ON_HANDOVER:-1}

volumes:
  munin-pg:
